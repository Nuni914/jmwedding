<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Calendar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Calendar Container */
        .calendar-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Header Navigation */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #4a6fa5;
            color: #ffffff;
            padding: 20px;
        }

        .calendar-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 10px;
            transition: transform 0.2s;
        }

        .nav-btn:hover {
            transform: scale(1.2);
        }

        /* Calendar Body Grid Layout */
        .calendar-body {
            padding: 20px;
        }

        .weekdays, .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .weekdays {
            font-weight: 600;
            color: #777;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .days div {
            padding: 12px 0;
            font-size: 0.95rem;
            color: #333;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .days div:hover:not(.empty) {
            background: #e1e9f5;
        }

        /* Specialized day styles */
        .days .today {
            background: #4a6fa5;
            color: #ffffff;
            font-weight: bold;
        }

        .days .today:hover {
            background: #3b5c8a;
        }

        .days .empty {
            cursor: default;
        }

        /* CSS Grid responsiveness makes this naturally adaptive, 
           but we can tighten padding on very small screens */
        @media (max-width: 380px) {
            .calendar-header { padding: 15px; }
            .calendar-body { padding: 12px; }
            .days div { padding: 8px 0; }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prevBtn" class="nav-btn">&lt;</button>
            <h2 id="monthYearTitle"></h2>
            <button id="nextBtn" class="nav-btn">&gt;</button>
        </div>
        <div class="calendar-body">
            <div class="weekdays">
                <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
            </div>
            <div id="daysContainer" class="days"></div>
        </div>
    </div>

    <script>
        const monthYearTitle = document.getElementById("monthYearTitle");
        const daysContainer = document.getElementById("daysContainer");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        const months = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        let currentDate = new Date();

        function renderCalendar() {
            daysContainer.innerHTML = "";
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Set header title
            monthYearTitle.innerText = `${months[month]} ${year}`;

            // Find first day of the month (0 = Sunday, 1 = Monday, etc.)
            const firstDayIndex = new Date(year, month, 1).getDay();
            
            // Find total days in the current month
            const totalDays = new Date(year, month + 1, 0).getDate();

            // Render empty spacer blocks for the previous month's trailing days
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement("div");
                emptyDiv.classList.add("empty");
                daysContainer.appendChild(emptyDiv);
            }

            // Render active month days
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement("div");
                dayDiv.innerText = day;

                // Highlight today's date if it matches real time
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayDiv.classList.add("today");
                }

                daysContainer.appendChild(dayDiv);
            }
        }

        // Event listeners for browser-side navigation
        prevBtn.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Initialize display
        renderCalendar();
    </script>
</body>
</html>
