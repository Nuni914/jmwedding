                <div id="nav-placeholder"></div>
    <script>

    fetch('nav.html')

    .then(response => response.text())

    .then(data => {

    document.getElementById('nav-placeholder').innerHTML = data;

    // Wait until nav.html is loaded, THEN attach toggle behavior

    const toggleButton = document.getElementsByClassName('toggle-button')[0];

    const navbarLinks = document.getElementsByClassName('romeo')[0];

    if (toggleButton && navbarLinks) {

    toggleButton.addEventListener('click', () => {

    navbarLinks.classList.toggle('active');

    });

    }

    });

    </script>

<body>
    <main>
        <section class="top">
            <div class="input">
                <!-- Your updated Form -->
<form id="rsvp-form">
    Your Name:<br>
    <input type="text" name="username" required><br>
    Your E-mail:<br>
    <input type="email" name="email" required><br>
    Phone:<br>
    <input type="tel" id="phone" name="phone" placeholder="xxx-xxx-xxxx" pattern="[0-9]{x}-[0-9]{x}-[0-9]{x}" required><br>
    Adults:<br>
    <input type="text" name="adults"><br>
    Minors:<br>
    <input type="text" name="minors"><br>
    <input type="submit" value="Submit RSVP">
</form>
<div id="status-message"></div>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbw8fHFmdn1WoZJohtTkaTshrcwgb_Cxyq47HKRzpHttvF3AjZaLgZ0rt4cDrxtdQAY1fA/exec'; // Paste your URL here
  const form = document.getElementById('rsvp-form');
  const statusMessage = document.getElementById('status-message');

  form.addEventListener('submit', e => {
    e.preventDefault();
    statusMessage.innerHTML = "Sending...";
    
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        statusMessage.innerHTML = "RSVP Sent Successfully!";
        form.reset();
      })
      .catch(error => {
        statusMessage.innerHTML = "Error! Please try again.";
        console.error('Error!', error.message);
      });
  });
</script>
